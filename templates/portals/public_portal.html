<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>DX Engine — Public Portal</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  >
  <link rel="stylesheet" href="/public/css/dx-engine.css">
</head>
<body class="bg-light d-flex flex-column min-vh-100">

  <header class="border-bottom bg-white">
    <div class="container py-3 d-flex align-items-center justify-content-between">
      <div class="d-flex align-items-center gap-2">
        <img
          src="/public/assets/org-logo.svg"
          alt="Organization Logo"
          style="height:32px;width:auto;"
          onerror="this.style.display='none';"
        >
        <span class="fw-semibold">Public Service Portal</span>
      </div>
      <span class="text-secondary small">Anonymous Intake</span>
    </div>
  </header>

  <main class="container flex-grow-1 py-4">
    <div class="row justify-content-center">
      <div class="col-12 col-lg-8">
        <div class="card shadow-sm">
          <div class="card-body">
            <div id="dx-container"></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="border-top bg-white mt-auto">
    <div class="container py-3 text-center text-secondary small">
      © <span id="portal-year"></span> Public Portal. All rights reserved.
    </div>
  </footer>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"
  ></script>

  <script src="/public/js/StateManager.js"></script>
  <script src="/public/js/ComponentRegistry.js"></script>
  <script src="/public/js/VisibilityEngine.js"></script>
  <script src="/public/js/Validator.js"></script>
  <script src="/public/js/Stepper.js"></script>
  <script src="/public/js/DXInterpreter.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      document.getElementById('portal-year').textContent = String(new Date().getFullYear());

      window.DX.Interpreter.init({
        containerId: 'dx-container',
        dxId: 'PublicPortalDX',
        caseId: null,
        initialETag: null
      });
    });
  </script>
</body>
</html>
