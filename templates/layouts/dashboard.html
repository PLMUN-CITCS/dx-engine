<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>DX Engine — Work Dashboard</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  >
  <link rel="stylesheet" href="/public/css/dx-engine.css">
</head>
<body class="bg-light">

  <nav class="navbar navbar-expand-lg bg-white border-bottom shadow-sm">
    <div class="container-fluid">
      <a class="navbar-brand fw-semibold" href="#">DX Engine</a>
      <div class="d-flex align-items-center gap-3">
        <div class="d-flex align-items-center gap-2">
          <span class="rounded-circle bg-secondary text-white d-inline-flex justify-content-center align-items-center" style="width:32px;height:32px;">
            U
          </span>
          <span class="small text-secondary" id="dashboard-user-label">User</span>
        </div>
        <a class="btn btn-outline-secondary btn-sm" href="/logout">Logout</a>
      </div>
    </div>
  </nav>

  <main class="container-fluid py-3">
    <div class="row g-3">
      <div class="col-12 col-xl-8">
        <div class="card shadow-sm h-100">
          <div class="card-header bg-white">
            <h1 class="h6 mb-0">Assignments</h1>
          </div>
          <div class="card-body">
            <div id="dx-container"></div>
          </div>
        </div>
      </div>

      <div class="col-12 col-xl-4">
        <div class="card shadow-sm mb-3">
          <div class="card-header bg-white">
            <h2 class="h6 mb-0">Summary</h2>
          </div>
          <div class="card-body">
            <div class="d-flex flex-column gap-2">
              <span id="summary-active" class="badge text-bg-primary text-start">My Active: 0</span>
              <span id="summary-overdue" class="badge text-bg-danger text-start">Overdue: 0</span>
              <span id="summary-due-today" class="badge text-bg-warning text-dark text-start">Due Today: 0</span>
              <span id="summary-upcoming" class="badge text-bg-info text-start">Upcoming: 0</span>
            </div>
          </div>
        </div>

        <div class="card shadow-sm">
          <div class="card-header bg-white">
            <h2 class="h6 mb-0">Queue Context</h2>
          </div>
          <div class="card-body">
            <p id="selected-role" class="small text-secondary mb-0">Selected Queue Role: N/A</p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"
  ></script>

  <script src="/public/js/StateManager.js"></script>
  <script src="/public/js/ComponentRegistry.js"></script>
  <script src="/public/js/VisibilityEngine.js"></script>
  <script src="/public/js/Validator.js"></script>
  <script src="/public/js/Stepper.js"></script>
  <script src="/public/js/DXInterpreter.js"></script>
  <script src="/public/js/DashboardPage.js"></script>
</body>
</html>
