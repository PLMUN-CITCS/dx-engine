<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>DX Engine — Work Life Cycle Manager</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  >
  <link rel="stylesheet" href="/public/css/dx-engine.css">
</head>
<body class="bg-light">

  <header class="border-bottom bg-white shadow-sm">
    <div class="container-fluid py-3">
      <div class="d-flex flex-wrap justify-content-between align-items-center gap-2">
        <div>
          <h1 class="h5 mb-1">Work Life Cycle Manager</h1>
          <div class="small text-secondary">
            <span id="case-reference-label">Case: N/A</span>
            <span class="mx-2">•</span>
            <span id="stage-label">Stage: N/A</span>
          </div>
        </div>
        <div class="d-flex align-items-center gap-2">
          <span id="status-badge" class="badge text-bg-primary">Status: N/A</span>
          <span id="sla-badge" class="badge text-bg-warning text-dark">SLA: Not set</span>
          <button
            class="btn btn-outline-secondary btn-sm"
            type="button"
            data-bs-toggle="offcanvas"
            data-bs-target="#historySidebar"
            aria-controls="historySidebar"
          >
            Stage History
          </button>
        </div>
      </div>
    </div>
  </header>

  <main class="container-fluid py-3">
    <div id="stepper-container" class="mb-3"></div>
    <div id="dx-container" class="card shadow-sm">
      <div class="card-body">
        <div class="text-secondary">Loading workflow...</div>
      </div>
    </div>
  </main>

  <div
    class="offcanvas offcanvas-end"
    tabindex="-1"
    id="historySidebar"
    aria-labelledby="historySidebarLabel"
  >
    <div class="offcanvas-header">
      <h2 class="offcanvas-title h6" id="historySidebarLabel">Stage History & Audit Trail</h2>
      <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
    </div>
    <div class="offcanvas-body">
      <div id="history-container" class="small text-secondary">
        History is loaded from the workflow payload.
      </div>
    </div>
  </div>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"
  ></script>

  <script src="/public/js/StateManager.js"></script>
  <script src="/public/js/ComponentRegistry.js"></script>
  <script src="/public/js/VisibilityEngine.js"></script>
  <script src="/public/js/Validator.js"></script>
  <script src="/public/js/Stepper.js"></script>
  <script src="/public/js/DXInterpreter.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      window.DX.Interpreter.init({
        containerId: 'dx-container',
        dxId: 'WorkLifeCycleDX',
        caseId: null,
        initialETag: null
      });

      document.addEventListener('dx:statechange', function (event) {
        const state = event.detail || {};

        if (state.case_reference) {
          document.getElementById('case-reference-label').textContent = 'Case: ' + state.case_reference;
        }

        if (state.stage_label) {
          document.getElementById('stage-label').textContent = state.stage_label;
        }

        if (state.case_status_label) {
          document.getElementById('status-badge').textContent = state.case_status_label;
        }

        if (state.sla_due_label) {
          document.getElementById('sla-badge').textContent = state.sla_due_label;
        }
      });
    });
  </script>
</body>
</html>
